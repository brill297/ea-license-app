<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FLASH THE BOT - License Validation</title>
  <style>
    body {
      font-family: sans-serif;
      background-color: #f3f4f6;
      text-align: center;
      padding: 40px;
    }
    .container {
      max-width: 400px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    input, button {
      padding: 10px;
      width: 100%;
      margin-top: 15px;
      font-size: 16px;
    }
    #downloadEA {
      display: none;
      margin-top: 20px;
    }
    .error {
      color: red;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>FLASH THE BOT</h2>
    <p>Enter your license key to download the EA file</p>
    <input type="text" id="licenseInput" placeholder="Enter license key" />
    <button onclick="validateLicense()">Validate License</button>
    <div class="error" id="errorMsg"></div>

    <div id="downloadEA">
      <p>✅ License validated!</p>
      <a href="/FLASHBOT.ex5" download>⬇️ Download EA File</a>
    </div>
  </div>

  <script>
    const VALID_KEYS = [
      "LICENSE-KEY-001",
      "FLASH-BOT-ABC123",
      "DEMO-KEY-XYZ"
    ];

    function validateLicense() {
      const key = document.getElementById("licenseInput").value.trim();
      const errorMsg = document.getElementById("errorMsg");
      const downloadBox = document.getElementById("downloadEA");
      errorMsg.textContent = "";
      downloadBox.style.display = "none";

      if (!key) {
        errorMsg.textContent = "Please enter a license key.";
        return;
      }

      if (!VALID_KEYS.includes(key)) {
        errorMsg.textContent = "❌ Invalid license key.";
        return;
      }

      // ✅ Valid key
      downloadBox.style.display = "block";
    }
  </script>
</body>
</html>
